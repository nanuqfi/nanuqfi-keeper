<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
  </defs>

  <rect width="800" height="160" fill="#080B11" rx="12"/>

  <!-- Title -->
  <text x="400" y="25" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle" letter-spacing="3">DECISION PIPELINE</text>

  <!-- Box 1: Market Scan -->
  <rect x="30" y="45" width="160" height="80" rx="10" fill="#0EA5E9" fill-opacity="0.08" stroke="#0EA5E9" stroke-opacity="0.3" stroke-width="1"/>
  <text x="110" y="70" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#0EA5E9" text-anchor="middle">Market Scan</text>
  <text x="110" y="88" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">Kamino API</text>
  <text x="110" y="100" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">Marginfi SDK</text>
  <text x="110" y="112" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">Lulo API</text>

  <!-- Arrow 1 -->
  <line x1="195" y1="85" x2="225" y2="85" stroke="#334155" stroke-width="2"/>
  <polygon points="225,80 235,85 225,90" fill="#334155"/>

  <!-- Box 2: Algorithm -->
  <rect x="240" y="45" width="160" height="80" rx="10" fill="#10B981" fill-opacity="0.08" stroke="#10B981" stroke-opacity="0.3" stroke-width="1"/>
  <text x="320" y="70" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#10B981" text-anchor="middle">Algorithm</text>
  <text x="320" y="88" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">Risk-adjusted scoring</text>
  <text x="320" y="100" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">Opportunity cost</text>
  <text x="320" y="112" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">Concentration cap</text>

  <!-- Arrow 2 -->
  <line x1="405" y1="85" x2="435" y2="85" stroke="#334155" stroke-width="2"/>
  <polygon points="435,80 445,85 435,90" fill="#334155"/>

  <!-- Box 3: AI Assessment -->
  <rect x="450" y="45" width="160" height="80" rx="10" fill="#8B5CF6" fill-opacity="0.08" stroke="#8B5CF6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="530" y="70" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#8B5CF6" text-anchor="middle">AI Assessment</text>
  <text x="530" y="88" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">Regime detection</text>
  <text x="530" y="100" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">Sustainability</text>
  <text x="530" y="112" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">Confidence scoring</text>

  <!-- Arrow 3 -->
  <line x1="615" y1="85" x2="645" y2="85" stroke="#334155" stroke-width="2"/>
  <polygon points="645,80 655,85 645,90" fill="#334155"/>

  <!-- Box 4: On-Chain -->
  <rect x="660" y="45" width="110" height="80" rx="10" fill="#F59E0B" fill-opacity="0.08" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1"/>
  <text x="715" y="70" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#F59E0B" text-anchor="middle">On-Chain</text>
  <text x="715" y="88" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">Rebalance TX</text>
  <text x="715" y="100" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">PDA + weights</text>
  <text x="715" y="112" font-family="ui-monospace, monospace" font-size="9" fill="#64748B" text-anchor="middle">+ reasoning hash</text>

  <!-- Footer -->
  <text x="400" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">AI is advisory only. It proposes, the algorithm validates, the program enforces.</text>
</svg>
