name: nanuqfi-keeper

services:
  keeper:
    image: ghcr.io/nanuqfi/nanuqfi-keeper:latest
    container_name: nanuqfi-keeper
    restart: unless-stopped
    ports:
      - "9000:3000"
    env_file:
      - .env
    volumes:
      - /home/nanuqfi/secrets/keeper-wallet.json:/run/secrets/keeper-wallet:ro
      - keeper-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    environment:
      - AI_HISTORY_PATH=/data/ai-history.json
      - DECISION_HISTORY_PATH=/data/decision-history.json
      - HEALTH_STATS_PATH=/data/health-stats.json
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  keeper-data:
